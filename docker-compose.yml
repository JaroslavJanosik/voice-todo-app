services:
  voice-todo-backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    image: voice-todo-backend:1.0
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////data/database.db
      CORS_ORIGINS: http://localhost,http://localhost:4173,http://voice-todo-frontend:4173
      WHISPER_MODEL: base
      WHISPER_CACHE_DIR: /data/whisper-cache
      APP_NAME: voice-todo-app-backend
      APP_VERSION: 1.0.0
    ports:
      - "5000:5000"
    volumes:
      - voice-todo-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/health').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  voice-todo-frontend:
    build:
      context: ./frontend/svelte
      dockerfile: ./Dockerfile
    image: voice-todo-frontend:1.0
    restart: unless-stopped
    environment:
      PUBLIC_API_BASE_URL: ""
    ports:
      - "4173:4173"
    depends_on:
      voice-todo-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4173/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:stable
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      voice-todo-backend:
        condition: service_healthy
      voice-todo-frontend:
        condition: service_healthy

volumes:
  voice-todo-data:
