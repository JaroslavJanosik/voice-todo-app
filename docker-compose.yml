services:
  voice-todo-backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    image: voice-todo-backend:1.0
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////data/database.db
      CORS_ORIGINS: http://localhost,http://127.0.0.1,http://localhost:${NGINX_PORT:-80},http://127.0.0.1:${NGINX_PORT:-80},http://localhost:${FRONTEND_PORT:-4173},http://127.0.0.1:${FRONTEND_PORT:-4173},http://voice-todo-frontend:4173
      WHISPER_MODEL: base
      WHISPER_CACHE_DIR: /data/whisper-cache
      WHISPER_PRELOAD_MODEL: "1"
      HEALTHCHECK_PATH: /ready
      APP_NAME: voice-todo-app-backend
      APP_VERSION: 1.0.0
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - voice-todo-data:/data

  voice-todo-frontend:
    build:
      context: ./frontend/svelte
      dockerfile: ./Dockerfile
    image: voice-todo-frontend:1.0
    restart: unless-stopped
    environment:
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://127.0.0.1:${BACKEND_PORT:-5000}}
    ports:
      - "${FRONTEND_PORT:-4173}:4173"
    depends_on:
      voice-todo-backend:
        condition: service_healthy

  nginx:
    image: nginx:stable
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      voice-todo-backend:
        condition: service_healthy
      voice-todo-frontend:
        condition: service_healthy

volumes:
  voice-todo-data:
