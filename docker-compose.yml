services:
  voice-todo-backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    image: voice-todo-backend:1.0
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////data/database.db
      CORS_ORIGINS: http://localhost,http://localhost:4173,http://voice-todo-frontend:4173
      WHISPER_MODEL: base
      APP_NAME: voice-todo-app-backend
      APP_VERSION: 1.0.0
    ports:
      - "5000:5000"
    volumes:
      - voice-todo-data:/data

  voice-todo-frontend:
    build:
      context: ./frontend/svelte
      dockerfile: ./Dockerfile
    image: voice-todo-frontend:1.0
    restart: unless-stopped
    environment:
      PUBLIC_API_BASE_URL: ""
    ports:
      - "4173:4173"
    depends_on:
      - voice-todo-backend

  nginx:
    image: nginx:stable
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - voice-todo-backend
      - voice-todo-frontend

volumes:
  voice-todo-data:
