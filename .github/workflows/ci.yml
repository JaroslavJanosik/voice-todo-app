name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Create virtual environment
        run: python -m venv venv

      - name: Install backend dependencies
        run: |
          ./venv/bin/python -m pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt

      - name: Run backend pytest suite
        run: ./venv/bin/python -m pytest tests

      - name: Run backend syntax validation
        run: |
          PYTHONPYCACHEPREFIX=/tmp/voice-todo-pycache ./venv/bin/python -m py_compile \
            app.py \
            config.py \
            routes/audio_routes.py \
            routes/system_routes.py \
            routes/task_routes.py \
            services/audio_service.py \
            services/task_service.py \
            models/model.py \
            api_response.py \
            exceptions.py \
            utils.py

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/svelte
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/svelte/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Svelte type and quality checks
        run: npm run check

      - name: Run production build
        run: npm run build

  playwright:
    name: Playwright E2E And API
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend-quality
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/svelte/package-lock.json

      - name: Create backend virtual environment
        working-directory: backend
        run: python -m venv venv

      - name: Install backend dependencies
        working-directory: backend
        run: |
          ./venv/bin/python -m pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend/svelte
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/svelte/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        working-directory: frontend/svelte
        run: npx playwright install --with-deps chromium

      - name: Run Playwright suite
        working-directory: frontend/svelte
        run: npx playwright test

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          if-no-files-found: ignore
          path: |
            frontend/svelte/playwright-report
            frontend/svelte/test-results
